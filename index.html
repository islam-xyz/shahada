    <!-- Language Detection & Redirect -->
    <script>
    (function() {
        // All supported languages
        var supported = [
            'af','am','ar','bn','bs','cs','da','de','el','en','es',
            'fa','fi','fr','ha','hi','hu','id','it','ja','ko','mi',
            'ms','ne','nl','no','pl','pt','ro','ru','si','so','sq',
            'sv','sw','ta','th','tl','tr','uk','ur','vi','zh-CN','zh-TW'
        ];

        // Get user's preferred languages from browser
        var languages = navigator.languages || [navigator.language || navigator.userLanguage || 'en'];
        var match = 'en'; // default fallback

        for (var i = 0; i < languages.length; i++) {
            var lang = languages[i];

            // Try exact match first (e.g., zh-CN, zh-TW)
            if (supported.indexOf(lang) !== -1) {
                match = lang;
                break;
            }

            // Try base language (e.g., nl-BE ? nl, fr-BE ? fr, en-US ? en)
            var base = lang.split('-')[0];
            if (supported.indexOf(base) !== -1) {
                match = base;
                break;
            }

            // Special case: zh without region ? zh-CN
            if (base === 'zh') {
                match = 'zh-CN';
                break;
            }
        }

        // Redirect to the matched language
        window.location.replace('/' + match + '/');
    })();
    </script>
